<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>login page</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="container">
      <p class="heading">Login</p>
      <form action="">
        <input
          type="text"
          spellcheck="false"
          placeholder="username"
          class="username"
        />
        <input
          type="password"
          spellcheck="false"
          placeholder="password"
          class="password"
        />
      </form>
      <div class="inner-cont">
        <div class="container2">
          <input type="checkbox" />
          <p>Remember me</p>
        </div>
        <p>Forgot password?</p>
      </div>
      <a class="login-link">
        <button class="login-btn" >Login</button>
      </a>
      <p class="signup-msg">Don't have an account? <a href="">Register</a></p>
    </div>
    <script src="script.js"></script>
  </body>
</html>
